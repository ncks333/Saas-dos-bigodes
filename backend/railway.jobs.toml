[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'python -c \"import os; from redis import Redis; print(\\\"redis cleared:\\\", Redis.from_url(os.environ[\\\"REDIS_URL\\\"]).flushdb())\" && exec sleep infinity'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

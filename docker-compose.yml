services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bigodes}
      POSTGRES_USER: ${POSTGRES_USER:-bigodes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigodes}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigodes} -d ${POSTGRES_DB:-bigodes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: {context: ./backend}
    restart: unless-stopped
    env_file: .env
    environment: {DJANGO_SETTINGS_MODULE: core.settings.development}
    command: ["sh", "-c", "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"]
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: {context: ./backend}
    restart: unless-stopped
    env_file: .env
    environment: {DJANGO_SETTINGS_MODULE: core.settings.development}
    command: celery -A core worker -l INFO --concurrency=2
    volumes: [./backend:/app]
    depends_on:
      backend: {condition: service_started}
      redis: {condition: service_healthy}

  beat:
    build: {context: ./backend}
    restart: unless-stopped
    env_file: .env
    environment: {DJANGO_SETTINGS_MODULE: core.settings.development}
    command: celery -A core beat -l INFO
    volumes: [./backend:/app]
    depends_on:
      backend: {condition: service_started}
      redis: {condition: service_healthy}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        VITE_ASAAS_CHECKOUT_ORIGINS: ${VITE_ASAAS_CHECKOUT_ORIGINS:-https://sandbox.asaas.com}
        VITE_MR_SOLUTIONS_WHATSAPP_URL: ${VITE_MR_SOLUTIONS_WHATSAPP_URL:-https://wa.me/5511999999999?text=Teste}
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  postgres_data:
  redis_data:
